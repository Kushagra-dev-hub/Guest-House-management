<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LNMIIT Guesthouse</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">LNMIIT Guesthouse</a>
        <div class="nav-links">
            <a href="/login.html">Login</a>
        </div>
    </nav>

    <div class="auth-wrapper" style="padding: 4rem 2rem;">
        <div class="glass-card auth-card" style="max-width: 500px;">
            <div class="auth-header">
                <h1>Create an Account</h1>
                <p>Join to book rooms for visitors</p>
            </div>
            
            <div id="alertBox" class="alert alert-error"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address (LNMIIT only)</label>
                    <input type="email" id="email" class="form-control" placeholder="rollno@lnmiit.ac.in" required>
                </div>
                
                <div class="flex gap-4">
                    <div class="form-group" style="flex: 1;">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Min 8 chars" required minlength="8">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="passwordInp" class="form-label">Confirm Password</label>
                        <input type="password" id="passwordInp" class="form-control" placeholder="Confirm password" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="mobileNo" class="form-label">Mobile Number</label>
                    <input type="tel" id="mobileNo" class="form-control" placeholder="10 digits" pattern="[0-9]{10}" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
            </form>
            
            <p class="text-center mt-4" style="color: var(--text-muted); font-size: 0.875rem;">
                Already have an account? <a href="/login.html" style="color: var(--primary); text-decoration: none;">Login here</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alertBox');
            
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                password2: document.getElementById('passwordInp').value,
                mobileNo: document.getElementById('mobileNo').value,
            };
            
            if (payload.password !== payload.password2) {
                alertBox.className = 'alert alert-error';
                alertBox.style.display = 'block';
                alertBox.innerText = 'Passwords do not match';
                return;
            }
            
            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    alertBox.className = 'alert alert-success';
                    alertBox.style.display = 'block';
                    alertBox.innerText = 'Registration successful! Redirecting to login...';
                    
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    alertBox.className = 'alert alert-error';
                    alertBox.style.display = 'block';
                    alertBox.innerText = data.error || 'Registration failed';
                }
            } catch (error) {
                alertBox.className = 'alert alert-error';
                alertBox.style.display = 'block';
                alertBox.innerText = 'Something went wrong. Please try again later.';
            }
        });
    </script>
</body>
</html>
