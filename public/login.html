<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HostelCare</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">HostelCare</a>
        <div class="nav-links">
            <a href="/register.html">Sign Up</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Login to your account to continue</p>
            </div>
            
            <div id="alertBox" class="alert alert-error"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="rollno@lnmiit.ac.in" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
            </form>
            
            <p class="text-center mt-4" style="color: var(--text-muted); font-size: 0.875rem;">
                Don't have an account? <a href="/register.html" style="color: var(--primary); text-decoration: none;">Register here</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alertBox');
            
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    alertBox.className = 'alert alert-success';
                    alertBox.style.display = 'block';
                    alertBox.innerText = 'Login successful! Redirecting...';
                    
                    setTimeout(() => {
                        window.location.href = data.user.role === 'ADMIN' ? '/admin.html' : '/dashboard.html';
                    }, 1000);
                } else {
                    alertBox.className = 'alert alert-error';
                    alertBox.style.display = 'block';
                    alertBox.innerText = data.error || 'Login failed';
                }
            } catch (error) {
                alertBox.className = 'alert alert-error';
                alertBox.style.display = 'block';
                alertBox.innerText = 'Something went wrong. Please try again later.';
            }
        });
    </script>
</body>
</html>
